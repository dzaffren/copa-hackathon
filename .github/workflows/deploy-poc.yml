name: Deploy POC to GitHub Pages

# Publishes the Workstream Brain clickable prototype (docs/poc/workstream-brain)
# as the live demo site. The site root is the POC, so the URL opens on index.html.
#
# This previously published docs/poc/policy-consistency-ai — the FIRST of four
# iterations, titled "Rulebook Radar". It last changed 10 Jul while current work
# continued elsewhere, and because the path filter only watched that folder, no
# workstream-brain change could ever trigger a deploy. Anyone following the
# README's live-demo link was evaluating a three-iteration-old product.
#
# Deploys from `main` only. Workstream-brain work currently lands on `dzaf/main`,
# so the public demo will not refresh until that is merged up — deliberate: the
# published artifact should track the canonical branch, not a personal one.

on:
  push:
    branches: [main]
    paths:
      - "docs/poc/workstream-brain/**"
      - ".github/workflows/deploy-poc.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; newer pushes supersede in-flight ones.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload POC as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/poc/workstream-brain

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

name: Tests

# Runs the engine (pytest) and Workstream Brain frontend (vitest) suites.
#
# Why this exists: until now no workflow ran a single test. The only automated
# gate was the confidentiality path check, which is why a rebuild in #34 could
# silently narrow data/artifacts/ from 7 documents to 2 without anything failing.
# A green suite is not proof the artifacts are correct (see the trace-integrity
# gap noted in docs/learnings/), but an unrun suite is proof of nothing at all.

on:
  pull_request:
  push:
    branches: [main, "dzaf/main"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  engine:
    name: engine (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Installed explicitly rather than via `pip install -e .` — the editable
        # build does not resolve cleanly here, and TestClient needs httpx +
        # python-multipart as explicit deps (see the FastAPI TestClient learning).
        run: |
          python -m pip install --upgrade pip
          pip install \
            pytest \
            python-dotenv \
            fastapi \
            httpx \
            python-multipart \
            uvicorn \
            anthropic \
            azure-ai-inference \
            'markitdown[pdf,docx]'

      - name: Run engine tests
        # PYTHONPATH=. so `import engine` resolves without an editable install.
        # No network and no Azure credentials are needed: every model call site
        # is injected as a seam and stubbed in tests.
        run: PYTHONPATH=. pytest engine/tests -q

  frontend:
    name: frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npx vitest run
